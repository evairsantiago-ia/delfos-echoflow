<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delfos EchoFlow · Redefinir senha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--teal:#0f3b46;--cyan:#1f8a9c;--amber:#e6a23c;--ink:#10242a;--line:#dde6e7;--mut:#62777d;--err:#b3402f;--ok:#2e7d52;--ui:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;--serif:'Fraunces',Georgia,serif;}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--ui);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(900px 420px at 80% 0,#cfe6ea 0,transparent 60%),#eef2f3}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 38px rgba(16,40,46,.14);max-width:430px;width:100%;padding:40px 34px}
  .mark{width:48px;height:48px;border-radius:12px;background:linear-gradient(150deg,#e6a23c,#d6892a);display:grid;place-items:center;margin:0 auto 16px}.mark svg{width:31px;height:31px}
  h1{font-family:var(--serif);font-size:25px;margin:0 0 6px;text-align:center}
  .sub{color:var(--mut);font-size:14px;text-align:center;margin:0 0 22px;line-height:1.5}
  label{font-size:12px;color:var(--mut);font-weight:600;display:block;margin:12px 0 6px}
  .inp{position:relative}
  input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:11px;font:inherit;font-size:15px;background:#fcfefe}
  input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(31,138,156,.15)}
  .toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--mut);font-size:13px;font-weight:600}
  .btn{width:100%;padding:13px;border:none;border-radius:11px;font:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;background:linear-gradient(180deg,#15525f,#0f3b46);color:#fff;box-shadow:0 5px 16px rgba(15,59,70,.3);display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:.16s}
  .btn:hover{transform:translateY(-1px)}
  .err{background:#f6dcd5;color:var(--err);font-size:12.5px;padding:9px 11px;border-radius:9px;margin-bottom:8px;display:none}
  .ok{width:70px;height:70px;border-radius:50%;background:#e3f3ea;color:var(--ok);display:grid;place-items:center;font-size:34px;margin:0 auto 16px}
  .note{font-size:11.5px;color:var(--mut);line-height:1.5;margin-top:18px;text-align:center}
</style>
</head>
<body>
  <div class="card" id="boxForm">
    <div class="mark"><svg viewBox="0 0 24 24" fill="none"><g stroke="#fff" stroke-width="1.6" stroke-linecap="round"><path d="M12 3v5M12 16v5M3 12h5M16 12h5M5.6 5.6l3.5 3.5M14.9 14.9l3.5 3.5M18.4 5.6l-3.5 3.5M9.1 14.9l-3.5 3.5"/></g><circle cx="12" cy="12" r="2.3" fill="#fff"/></svg></div>
    <h1>Redefinir senha</h1>
    <p class="sub">Crie uma nova senha para sua conta.</p>
    <div id="erro" class="err"></div>
    <form onsubmit="redefinir(event)">
      <label for="s1">Nova senha</label>
      <div class="inp"><input id="s1" type="password" placeholder="mínimo 8 caracteres"><button type="button" class="toggle" onclick="ver('s1',this)">mostrar</button></div>
      <label for="s2">Confirmar nova senha</label>
      <div class="inp"><input id="s2" type="password" placeholder="repita a senha"><button type="button" class="toggle" onclick="ver('s2',this)">mostrar</button></div>
      <button type="submit" class="btn">Salvar nova senha →</button>
    </form>
    <p class="note">Demonstração: o backend valida o token do link e atualiza a senha com armazenamento seguro (hash).</p>
  </div>

  <div class="card" id="boxOk" style="display:none">
    <div class="ok">✓</div>
    <h1>Senha redefinida!</h1>
    <p class="sub">Sua senha foi atualizada com sucesso. Você já pode entrar na plataforma.</p>
    <a class="btn" href="login.html">Ir para o login →</a>
  </div>

<script>
  const API=(function(){var o=(location.origin&&location.origin.indexOf('http')===0)?location.origin:'';var s=localStorage.getItem('delfos_api');if(s&&s.indexOf('localhost')>=0)s='';return o||s||'https://creative-profiterole-865da4.netlify.app';})();
  const TOKEN=new URLSearchParams(location.search).get('token')||'';
  function ver(id,btn){const i=document.getElementById(id);const p=i.type==='password';i.type=p?'text':'password';btn.textContent=p?'ocultar':'mostrar';}
  async function redefinir(ev){ev.preventDefault();const a=document.getElementById('s1').value,b=document.getElementById('s2').value,e=document.getElementById('erro');
    if(a.length<8){e.textContent='A senha deve ter ao menos 8 caracteres.';e.style.display='block';return;}
    if(a!==b){e.textContent='As senhas não conferem.';e.style.display='block';return;}
    if(!TOKEN){e.textContent='Link inválido (token ausente). Solicite a recuperação novamente.';e.style.display='block';return;}
    try{
      const r=await fetch(API+'/auth/redefinir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN,senha:a})});
      const j=await r.json().catch(()=>({}));
      if(!r.ok){e.textContent=j.detail||'Não foi possível redefinir.';e.style.display='block';return;}
      document.getElementById('boxForm').style.display='none';document.getElementById('boxOk').style.display='block';
    }catch(err){e.textContent='Não foi possível conectar ao servidor ('+API+').';e.style.display='block';}}
</script>
</body>
</html>
