<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delfos EchoFlow · Conta confirmada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--teal:#0f3b46;--cyan:#1f8a9c;--amber:#e6a23c;--ink:#10242a;--line:#dde6e7;--mut:#62777d;--ok:#2e7d52;--ui:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;--serif:'Fraunces',Georgia,serif;}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--ui);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px;
    background:radial-gradient(900px 420px at 80% 0,#cfe6ea 0,transparent 60%),#eef2f3}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 38px rgba(16,40,46,.14);max-width:430px;width:100%;padding:40px 34px;text-align:center}
  .mark{width:50px;height:50px;border-radius:13px;background:linear-gradient(150deg,#e6a23c,#d6892a);display:grid;place-items:center;margin:0 auto 18px;box-shadow:0 6px 18px rgba(214,137,42,.45)}
  .mark svg{width:32px;height:32px}
  .ok{width:78px;height:78px;border-radius:50%;background:#e3f3ea;color:var(--ok);display:grid;place-items:center;font-size:40px;margin:0 auto 18px}
  h1{font-family:var(--serif);font-size:26px;margin:0 0 8px;font-weight:600}
  p{color:var(--mut);font-size:14.5px;line-height:1.6;margin:0 0 8px}
  b{color:var(--ink)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:none;border-radius:11px;font:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;background:linear-gradient(180deg,#15525f,#0f3b46);color:#fff;box-shadow:0 5px 16px rgba(15,59,70,.3);text-decoration:none;transition:.16s}
  .btn:hover{transform:translateY(-1px)}
  .note{font-size:11.5px;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <div class="mark"><svg viewBox="0 0 24 24" fill="none"><g stroke="#fff" stroke-width="1.6" stroke-linecap="round"><path d="M12 3v5M12 16v5M3 12h5M16 12h5M5.6 5.6l3.5 3.5M14.9 14.9l3.5 3.5M18.4 5.6l-3.5 3.5M9.1 14.9l-3.5 3.5"/></g><circle cx="12" cy="12" r="2.3" fill="#fff"/></svg></div>
    <div class="ok" id="icon">⏳</div>
    <h1 id="titulo">Confirmando…</h1>
    <p id="msg">Validando o link de confirmação.</p>
    <a class="btn" id="acao" href="login.html" style="display:none">Ir para o login →</a>
    <p class="note">O backend valida o token do link, ativa a conta e registra o consentimento (LGPD).</p>
  </div>
<script>
  const API=(localStorage.getItem('delfos_api')||((location.origin&&location.origin.indexOf('http')===0)?location.origin:'http://localhost:8000'));
  const token=new URLSearchParams(location.search).get('token')||'';
  function estado(icon,bg,cor,titulo,msg,mostrarBtn){
    const ic=document.getElementById('icon');ic.textContent=icon;ic.style.background=bg;ic.style.color=cor;
    document.getElementById('titulo').textContent=titulo;document.getElementById('msg').textContent=msg;
    document.getElementById('acao').style.display=mostrarBtn?'flex':'none';
  }
  (async()=>{
    if(!token){estado('⚠','#f6dcd5','#b3402f','Link inválido','Token ausente no link.',true);return;}
    try{
      const r=await fetch(API+'/auth/confirmar?token='+encodeURIComponent(token));
      const j=await r.json().catch(()=>({}));
      if(r.ok)estado('✓','#e3f3ea','#2e7d52','E-mail confirmado!','Sua conta foi ativada. Você já pode entrar na plataforma.',true);
      else estado('⚠','#f6dcd5','#b3402f','Não foi possível confirmar',j.detail||'Link inválido ou expirado.',true);
    }catch(err){estado('⚠','#fbf0dd','#8a6112','Servidor indisponível','Não foi possível conectar a '+API+'. Verifique se o backend está rodando.',true);}
  })();
</script>
</body>
</html>
